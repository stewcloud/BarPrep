<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Kitchen Labels</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { --bg:#f6f6f6; --card:#fff; --text:#111; --muted:#666; --border:#ddd; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background:var(--bg); color:var(--text); }
    header { background:#111; color:#fff; padding:16px 20px; display:flex; gap:16px; align-items:center; justify-content:space-between; }
    header a { color:#fff; text-decoration:none; font-weight:700; }
    nav { display:flex; gap:10px; flex-wrap:wrap; }
    nav a { background:#333; border-radius:12px; padding:10px 14px; }
    main { max-width:1000px; margin:0 auto; padding:20px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:16px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:18px; box-shadow:0 1px 4px rgba(0,0,0,.05); }
    .btn, button { display:inline-block; border:0; border-radius:16px; background:#111; color:#fff; padding:16px 20px; font-weight:800; font-size:18px; text-decoration:none; cursor:pointer; }
    .btn.secondary { background:#555; }
    .btn.light { background:#eee; color:#111; }
    .big-btn { width:100%; text-align:center; font-size:26px; padding:30px 18px; }
    label { display:block; font-weight:800; margin-top:14px; margin-bottom:6px; }
    input, select, textarea { width:100%; border:1px solid var(--border); border-radius:14px; padding:14px; font-size:18px; background:#fff; }
    table { width:100%; border-collapse:collapse; background:#fff; border-radius:14px; overflow:hidden; }
    th, td { text-align:left; padding:12px; border-bottom:1px solid var(--border); }
    .muted { color:var(--muted); }
    .flash { background:#fff9d7; border:1px solid #eadb82; padding:12px; border-radius:12px; margin-bottom:14px; }
    img.label-preview { max-width:100%; border:1px solid #ccc; background:#fff; }
    @media (max-width: 700px) {
      header { display:block; }
      nav { margin-top:12px; }
      .btn, button { width:100%; margin-top:8px; }
    }
  </style>
</head>
<body>
<header>
  <a href="/">Kitchen Labels</a>
  <nav>
    <a href="/batch/new">Create Batch</a>
    <a href="/">Bottle Existing</a>
    <a href="/items">Admin</a>
  </nav>
</header>
<main>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
