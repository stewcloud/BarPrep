{% extends "base.html" %}
{% block content %}
<h1>Day of Prep</h1>
<p class="muted">Used for fresh produce and non-batched items that go directly into service.</p>

{% if not items %}
<div class="card">
  <h2>No Day of Prep items yet</h2>
  <p class="muted">Add or edit an item and set Prep Workflow to <strong>Day of Prep</strong>.</p>
  <a class="btn" href="/items/new">Add Item</a>
</div>
{% else %}
<form method="post" class="card">
  <label>Item</label>
  <select name="item_id" required>
    {% for item in items %}
      <option value="{{ item.id }}">{{ item.category }} — {{ item.name }} / in-use {{ item.in_use_shelf_life_hours }}h</option>
    {% endfor %}
  </select>

  <label>Prepped By</label>
  <select name="user_id" required>
    {% for user in users %}
      <option value="{{ user.id }}" {% if current_user and user.id|string == current_user.id|string %}selected{% endif %}>{{ user.name }}</option>
    {% endfor %}
  </select>

  <label>Prepped At</label>
  <input type="datetime-local" name="prepped_at" value="{{ now }}" required>

  <label>Notes</label>
  <textarea name="notes" rows="3"></textarea>

  <button type="submit">Create Service Label</button>
</form>
{% endif %}
{% endblock %}
