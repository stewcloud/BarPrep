{% extends "base.html" %}
{% block content %}
<h1>Staff PIN</h1>
<form method="post" class="card" style="max-width:420px">
  <label>Enter PIN</label>
  <input name="pin" type="password" inputmode="numeric" pattern="[0-9]*" autofocus required style="font-size:32px; text-align:center; letter-spacing:8px">
  <button type="submit" class="big-btn">Unlock</button>
</form>
<p class="muted">QR detail pages are public/read-only. Staff actions require a PIN.</p>
{% endblock %}
