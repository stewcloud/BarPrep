{% extends "base.html" %}
{% block content %}
<h1>{% if item %}Edit Item{% else %}Add Item{% endif %}</h1>

<form method="post" class="card">
  <label>Name</label>
  <input name="name" value="{{ item.name if item else '' }}" required>


  <label>Prep Workflow</label>
  <select name="prep_workflow" id="prepWorkflow" required>
    {% for workflow in prep_workflows %}
      <option value="{{ workflow }}" {% if item and item.prep_workflow == workflow %}selected{% elif not item and workflow == 'Master Batch' %}selected{% endif %}>{{ workflow }}</option>
    {% endfor %}
  </select>

  

  <label>Category</label>
  <select name="category" required>
    {% for category in item_categories %}
      <option value="{{ category }}" {% if item and item.category == category %}selected{% elif not item and category == 'Prep' %}selected{% endif %}>{{ category }}</option>
    {% endfor %}
  </select>

  <label id="masterShelfLabel">Master Shelf Life, Days</label>
  <label><input type="checkbox" name="master_shelf_infinite" id="masterInfinite" {% if item and item.master_shelf_life_days == -1 %}checked{% endif %} style="width:auto"> Infinite ∞</label>
  <input name="master_shelf_life_days" id="masterShelf" type="number" value="{{ item.master_shelf_life_days if item and item.master_shelf_life_days != -1 else 7 }}" min="0">

  <label>In-Use Shelf Life, Hours</label>
  <label><input type="checkbox" name="in_use_shelf_infinite" id="inUseInfinite" {% if item and item.in_use_shelf_life_hours == -1 %}checked{% endif %} style="width:auto"> Infinite ∞</label>
  <input name="in_use_shelf_life_hours" id="inUseShelf" type="number" value="{{ item.in_use_shelf_life_hours if item and item.in_use_shelf_life_hours != -1 else 24 }}" min="0">
<label>Storage</label>
  <select name="storage" required>
    {% for storage in storage_options %}
      <option value="{{ storage }}" {% if item and item.storage == storage %}selected{% elif not item and storage == 'Keep Refrigerated' %}selected{% endif %}>{{ storage }}</option>
    {% endfor %}
  </select>

  <label>Brix % <span class="muted">(optional, useful for syrups)</span></label>
  <input name="brix_percent" type="number" step="0.1" min="0" max="100" value="{{ item.brix_percent if item and item.brix_percent is not none else '' }}">

  <label>ABV % <span class="muted">(optional, useful for infusions/spirits)</span></label>
  <input name="abv_percent" type="number" step="0.1" min="0" max="100" value="{{ item.abv_percent if item and item.abv_percent is not none else '' }}">

  <label>Allergens</label>
  <input name="allergens" value="{{ item.allergens if item else '' }}">

  {% if item %}
    <label><input type="checkbox" name="active" {% if item.active %}checked{% endif %} style="width:auto"> Active</label>
  {% endif %}

  <button type="submit">Save Item</button>
  <a class="btn light" href="/items">Cancel</a>
</form>
<script>
function toggleMasterShelf() {
  const workflow = document.getElementById("prepWorkflow");
  const master = document.getElementById("masterShelf");
  const masterInf = document.getElementById("masterInfinite");
  const label = document.getElementById("masterShelfLabel");
  if (!workflow || !master) return;
  if (workflow.value === "Day of Prep") {
    master.value = "0"; master.disabled = true;
    if (masterInf) { masterInf.checked = false; masterInf.disabled = true; }
    label.textContent = "Master Shelf Life, Days (disabled for Day of Prep)";
  } else {
    if (masterInf) masterInf.disabled = false;
    master.disabled = masterInf && masterInf.checked;
    if (!master.disabled && master.value === "0") master.value = "7";
    label.textContent = "Master Shelf Life, Days";
  }
}
function toggleInfinite() {
  const master = document.getElementById("masterShelf");
  const masterInf = document.getElementById("masterInfinite");
  const inUse = document.getElementById("inUseShelf");
  const inUseInf = document.getElementById("inUseInfinite");
  if (master && masterInf && !masterInf.disabled) master.disabled = masterInf.checked;
  if (inUse && inUseInf) inUse.disabled = inUseInf.checked;
}
document.getElementById("prepWorkflow")?.addEventListener("change", () => { toggleMasterShelf(); toggleInfinite(); });
document.getElementById("masterInfinite")?.addEventListener("change", toggleInfinite);
document.getElementById("inUseInfinite")?.addEventListener("change", toggleInfinite);
toggleMasterShelf(); toggleInfinite();
</script>
{% endblock %}
